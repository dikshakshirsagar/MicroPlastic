<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>µPlastic Detection — Login</title>
    <meta name="description" content="Sign in to the Microplastic Detection IoT Dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/auth.css">
</head>
<body>

    <!-- Animated Water Background -->
    <div class="water-bg">
        <!-- Floating microplastic particles -->
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
        <div class="particle p9"></div>
        <div class="particle p10"></div>
        <div class="particle p11"></div>
        <div class="particle p12"></div>

        <!-- Water wave layers -->
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>

        <!-- Bubble effects -->
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>
        <div class="bubble b5"></div>
        <div class="bubble b6"></div>
    </div>

    <!-- Auth Container -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Logo / Branding -->
            <div class="auth-header">
                <div class="auth-logo">
                    <svg viewBox="0 0 48 48" fill="none">
                        <!-- Water drop with microplastics inside -->
                        <defs>
                            <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#06b6d4" />
                                <stop offset="100%" style="stop-color:#3b82f6" />
                            </linearGradient>
                        </defs>
                        <path d="M24 4C24 4 8 22 8 32a16 16 0 0 0 32 0C40 22 24 4 24 4z" fill="url(#dropGrad)" opacity="0.9"/>
                        <path d="M24 4C24 4 8 22 8 32a16 16 0 0 0 32 0C40 22 24 4 24 4z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
                        <!-- Microplastic particles inside drop -->
                        <circle cx="18" cy="30" r="2" fill="rgba(255,255,255,0.6)"/>
                        <circle cx="26" cy="26" r="1.5" fill="rgba(255,255,255,0.5)"/>
                        <circle cx="22" cy="34" r="2.5" fill="rgba(255,255,255,0.4)"/>
                        <circle cx="30" cy="32" r="1.8" fill="rgba(255,255,255,0.5)"/>
                        <rect x="15" y="26" width="4" height="1.5" rx="0.75" fill="rgba(255,255,255,0.35)" transform="rotate(25 17 27)"/>
                        <rect x="27" y="29" width="3" height="1.2" rx="0.6" fill="rgba(255,255,255,0.3)" transform="rotate(-15 28 30)"/>
                    </svg>
                </div>
                <h1>µPlastic Detection</h1>
                <p class="auth-subtitle">Water Quality Monitoring System</p>
            </div>

            <!-- Tab Switcher -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
                <div class="tab-indicator" id="tabIndicator"></div>
            </div>

            <!-- Error / Success Messages -->
            <div class="auth-message hidden" id="authMessage">
                <span class="msg-icon"></span>
                <span class="msg-text"></span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <input type="email" id="loginEmail" placeholder="Email address" required autocomplete="email">
                </div>
                <div class="input-group">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="form-extras">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Forgot password?</a>
                </div>
                <button type="submit" class="auth-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader hidden">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="30 70"/></svg>
                    </span>
                </button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="auth-form hidden" onsubmit="handleSignup(event)">
                <div class="input-group">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <input type="text" id="signupName" placeholder="Full name" required autocomplete="name">
                </div>
                <div class="input-group">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <input type="email" id="signupEmail" placeholder="Email address" required autocomplete="email">
                </div>
                <div class="input-group">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required minlength="6" autocomplete="new-password">
                    <button type="button" class="toggle-password" onclick="togglePassword('signupPassword', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="input-group">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <input type="password" id="signupConfirm" placeholder="Confirm password" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="auth-btn signup-btn" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader hidden">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="30 70"/></svg>
                    </span>
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider">
                <span>or continue with</span>
            </div>

            <!-- Google Sign-In -->
            <button class="google-btn" onclick="handleGoogleSignIn()">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>

            <!-- Footer -->
            <div class="auth-footer">
                <p>🔬 Microplastic Detection System — Final Year Project</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="static/auth.js"></script>
</body>
</html>
